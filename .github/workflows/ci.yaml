name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          git \
          python3 \
          python3-dev \
          python3-pip \
          libspdlog-dev \
          libfmt-dev

    - name: Install Python Dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install pybind11 pytest

    - name: Build Project
      run: |
        chmod +x build.sh
        bash build.sh
        pip install -e .

    - name: Run Tests
      run: |
        pytest tests/ -v